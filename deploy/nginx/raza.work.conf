# Klick @ raza.work — nginx site config
#
# Liegt parallel zur bestehenden artisansole.com-Konfig auf demselben Host.
# Eigene Zone-Namen (klick_*), damit keine Kollision mit anderen Sites entsteht.
# Beide Domains zeigen per DNS auf dieselbe Server-IP; nginx routet per server_name.
#
# Ablage: /etc/nginx/sites-available/raza.work.conf
# Aktivieren: ln -s ../sites-available/raza.work.conf /etc/nginx/sites-enabled/
# Test:      nginx -t && systemctl reload nginx

# DDoS-Schutz, kalibriert auf realistische Shared-IP-Szenarien:
# - 30 r/s global: Apple Private Relay, VPNs, Mobilfunk-CGNAT, Office-NAT teilen
#   eine IP zwischen vielen Usern. Bei < 20 r/s blockt man hier sofort echte Nutzer.
# - 1 r/s auf /api/auth: Magic-Link-Spam-Schutz, eng halten ist OK.
# - Static-Assets (/_next/static, /favicon.ico, /icons, /manifest.json) sind
#   aus dem Limit ausgenommen — sie sollten ohnehin aggressiv gecacht werden.
limit_req_zone $binary_remote_addr zone=klick_global:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=klick_auth:10m rate=1r/s;
limit_conn_zone $binary_remote_addr zone=klick_connlimit:10m;

# HTTP → HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name raza.work www.raza.work;
    return 301 https://$host$request_uri;
}

# HTTPS Server
server {
    # http2 wird vom ersten 443-Block des Hosts geerbt (z. B. artisansole.com).
    # 'ssl' muss aber explizit hier stehen, sonst landet HTTPS-Traffic
    # auf einem anderen Block und es gibt 500/Redirect-Loops.
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name raza.work www.raza.work;

    ssl_certificate     /etc/letsencrypt/live/raza.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/raza.work/privkey.pem;

    # SSL Hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security-Header
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Verbindungs-Limit pro IP. HTTP/2 multiplext viele Streams über eine
    # Verbindung — 50 erlaubt 2-3 parallele Tabs hinter NAT/VPN.
    limit_conn klick_connlimit 50;

    # Request-Body / Header-Timeouts
    client_max_body_size 25M;
    client_body_timeout 15s;
    client_header_timeout 10s;

    # Statische Assets: kein Rate-Limit, langes Browser-Cache.
    # Next.js fingerprintet alle URLs unter /_next/static, also cache-safe.
    location ~* ^/(_next/static|favicon\.ico|icons/|manifest\.json|.*\.(?:svg|png|jpg|jpeg|gif|webp|woff2?|ttf|otf)$) {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Browser-Cache 1 Jahr für fingerprintete Assets (Next.js).
        # Für nicht-fingerprintete (favicon etc.) reicht 1 Tag.
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Auth.js v5 Endpoints (Magic-Link-Anfrage, Callback) — strenges Rate-Limit
    location /api/auth/ {
        limit_req zone=klick_auth burst=5 nodelay;
        limit_conn klick_connlimit 10;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Vault-File-Stream (Decrypt-Stream): kein Buffering, längere Read-Timeouts
    location /api/vault/ {
        limit_req zone=klick_global burst=60 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Restliche API + alles andere (Server-Actions, RSC-Payloads, Pages)
    # burst=60 fängt den Initial-Pageload (HTML + RSC + chunks) ab, ohne
    # echte User hinter Shared-IPs zu killen.
    location / {
        limit_req zone=klick_global burst=60 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_read_timeout 60s;
    }
}
