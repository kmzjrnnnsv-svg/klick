# Klick @ raza.work — nginx site config
#
# Liegt parallel zur bestehenden artisansole.com-Konfig auf demselben Host.
# Eigene Zone-Namen (klick_*), damit keine Kollision mit anderen Sites entsteht.
# Beide Domains zeigen per DNS auf dieselbe Server-IP; nginx routet per server_name.
#
# Ablage: /etc/nginx/sites-available/raza.work.conf
# Aktivieren: ln -s ../sites-available/raza.work.conf /etc/nginx/sites-enabled/
# Test:      nginx -t && systemctl reload nginx

# DDoS-Schutz: max 10 Requests/Sekunde pro IP (global), 1 r/s an Auth-Endpoints
limit_req_zone $binary_remote_addr zone=klick_global:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=klick_auth:10m rate=1r/s;
limit_conn_zone $binary_remote_addr zone=klick_connlimit:10m;

# HTTP → HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name raza.work www.raza.work;
    return 301 https://$host$request_uri;
}

# HTTPS Server
server {
    # http2 wird vom ersten 443-Block des Hosts geerbt (z. B. artisansole.com).
    # 'ssl' muss aber explizit hier stehen, sonst landet HTTPS-Traffic
    # auf einem anderen Block und es gibt 500/Redirect-Loops.
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name raza.work www.raza.work;

    ssl_certificate     /etc/letsencrypt/live/raza.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/raza.work/privkey.pem;

    # SSL Hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security-Header
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # DDoS: Max 20 gleichzeitige Verbindungen pro IP
    limit_conn klick_connlimit 20;

    # Request-Body / Header-Timeouts
    client_max_body_size 25M;
    client_body_timeout 15s;
    client_header_timeout 10s;

    # Auth.js v5 Endpoints (Magic-Link-Anfrage, Callback) — strenges Rate-Limit
    location /api/auth/ {
        limit_req zone=klick_auth burst=3 nodelay;
        limit_conn klick_connlimit 10;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Vault-File-Stream (Decrypt-Stream): kein Buffering, längere Read-Timeouts
    location /api/vault/ {
        limit_req zone=klick_global burst=20 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Restliche API + alles andere (Server-Actions, RSC-Payloads, Pages)
    location / {
        limit_req zone=klick_global burst=20 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_read_timeout 60s;
    }
}
